name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Check
        run: moon check

      - name: Format
        run: moon fmt --check

      - name: Build
        run: moon build

      - name: Test
        run: moon test

      - name: Install syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft version

      - name: Generate our SBOM snapshots
        run: |
          for eco in cargo go terraform; do
            python3 scripts/run_our_tool.py \
              --ecosystem "$eco" \
              --fixture "tests/fixtures/$eco" \
              --out-spdx  "tests/snapshots/$eco/our_spdx.json" \
              --out-cyclonedx "tests/snapshots/$eco/our_cyclonedx.json"
          done

      - name: Generate syft SBOM snapshots
        run: bash scripts/run_syft.sh

      - name: Run comparisons
        run: |
          SNAP="tests/snapshots"
          for eco in cargo go terraform; do
            for fmt in spdx cyclonedx; do
              our="$SNAP/$eco/our_${fmt}.json"
              syft_f="$SNAP/$eco/syft_${fmt}.json"
              msbom_f="$SNAP/$eco/msbom_${fmt}.json"
              diff_f="$SNAP/$eco/diff_${fmt}.json"
              cmd=(python3 scripts/compare.py --ecosystem "$eco" --ours "$our" --format "$fmt")
              [ -f "$syft_f"  ] && cmd+=(--syft  "$syft_f")
              [ -f "$msbom_f" ] && cmd+=(--msbom "$msbom_f")
              "${cmd[@]}" > "$diff_f"
            done
          done

      - name: Generate COMPARISON.md
        run: |
          diff_files=()
          for eco in cargo go terraform; do
            for fmt in spdx cyclonedx; do
              f="tests/snapshots/$eco/diff_${fmt}.json"
              [ -f "$f" ] && diff_files+=("$f")
            done
          done
          python3 scripts/generate_readme.py \
            --results "${diff_files[@]}" \
            --output COMPARISON.md

      - name: Commit COMPARISON.md
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add COMPARISON.md tests/snapshots/
          git diff --cached --quiet || git commit -m "chore: update COMPARISON.md [skip ci]"
          git push
